[build]
# Use all available cores.
jobs = 0

[profile.release]
# Full optimisation for the wt binary.
opt-level     = 3
lto           = "thin"
codegen-units = 1
strip         = "symbols"

[profile.dev]
opt-level = 0
debug     = true

[alias]
# cargo wt — build and run the CLI in one step.
wt = "run --release --bin wt --"
